name: Actualizar campo trend

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  actualizar-trend:
    runs-on: ubuntu-22.04
    if: github.event.pull_request.merged == true
    
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Autenticar GitHub CLI
        run: echo "${{ secrets.GH_TOKEN }}" | gh auth login --with-token

      - name: Descargar artefacto y actualizar trend
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Obtener issue vinculado
          ISSUE=$(gh pr view "$PR_NUMBER" --json closingIssuesReferences -q ".closingIssuesReferences[0].number" 2>/dev/null || \
                  echo "$PR_BODY" | grep -oP '(Closes|Fixes|Resolves) #\K\d+' | head -n 1)
          
          if [ -z "$ISSUE" ]; then
            echo "No se encontró issue vinculado"
            exit 0
          fi
          
          # Descargar artefacto y extraer hallazgos
          gh run download -n security-reports -D ./tmp 2>/dev/null || exit 0
          HALLAZGOS=$(grep -oP '<div class="metric-value">\K\d+(?=</div>\s*<div class="metric-label">Hallazgos)' ./tmp/dashboard.html 2>/dev/null)
          
          if [ -z "$HALLAZGOS" ]; then
            echo "No se pudieron extraer hallazgos"
            exit 0
          fi
          
          # Obtener hallazgos previos del issue
          PREVIOS=$(gh issue view "$ISSUE" --json body -q ".body" | grep -oP '(Hallazgos previos|Hallazgos anteriores):\s*\K\d+' || echo "0")
          
          # Determinar trend
          if [ "$HALLAZGOS" -lt "$PREVIOS" ]; then
            TREND="mejora"
          elif [ "$HALLAZGOS" -gt "$PREVIOS" ]; then
            TREND="empeora"
          else
            exit 0
          fi
          
          # Actualizar campo trend en el proyecto
          FIELDS=$(gh project field-list 11 --owner "@me" --format json 2>/dev/null || echo "{}")
          FIELD_ID=$(echo "$FIELDS" | jq -r '.fields[] | select(.name == "trend" or .name == "Trend") | .id' 2>/dev/null)
          OPTION_ID=$(echo "$FIELDS" | jq -r --arg TREND "$TREND" '.fields[] | select(.name == "trend" or .name == "Trend") | .options[] | select(.name == $TREND) | .id' 2>/dev/null)
          
          if [ -n "$FIELD_ID" ] && [ -n "$OPTION_ID" ]; then
            PROJECT_ID=$(gh project list --format json -q ".projects[] | select(.number == 11) | .id" 2>/dev/null)
            ITEM_ID=$(gh project item-list 11 --owner "@me" --format json 2>/dev/null | jq ".items[] | select(.content.number == $ISSUE) | .id" 2>/dev/null)
            
            if [ -n "$ITEM_ID" ]; then
              gh project item-edit --project-id "$PROJECT_ID" --id "$ITEM_ID" --field-id "$FIELD_ID" --single-select-option-id "$OPTION_ID" 2>/dev/null
              echo "Trend actualizado a: $TREND (hallazgos: $PREVIOS -> $HALLAZGOS)"
            fi
          fi
